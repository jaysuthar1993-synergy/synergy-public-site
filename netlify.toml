[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# NOTE: Site is hosted on Cloudflare Pages (not Netlify — this file kept for reference only)
# Branch preview URLs:
# main/master → synergyfuturecorp.com
# develop     → https://develop.synergy-public-site.pages.dev/

[context.production]
  command = "npm run build"

[context.staging]
  command = "npm run build"

[context.develop]
  command = "npm run build"

# Redirect /sitemap.xml → Next.js built-in /sitemap route
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap"
  status = 200
  force = true

# SPA fallback — Next.js handles this but belt-and-suspenders
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
